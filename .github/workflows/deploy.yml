name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Ensure IONOS htdocs folder exists
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          sshpass -p "${{ secrets.IONOS_FTP_PASSWORD }}" sftp -o StrictHostKeyChecking=no -P 22 \
            "${{ secrets.IONOS_FTP_USER }}@${{ secrets.IONOS_FTP_HOST }}" <<'EOF' || true
          mkdir htdocs
          EOF

      - name: Deploy to IONOS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.IONOS_FTP_HOST }}
          username: ${{ secrets.IONOS_FTP_USER }}
          password: ${{ secrets.IONOS_FTP_PASSWORD }}
          port: 22
          # IONOS often serves the site from /htdocs, not SFTP root
          local_path: ./dist/
          remote_path: /htdocs/
          sftp_only: true
